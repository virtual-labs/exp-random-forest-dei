<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Color Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
        }

        .color-box {
            width: 200px;
            height: 100px;
            margin: 20px;
            display: inline-block;
            text-align: center;
            line-height: 100px;
            color: white;
            font-weight: bold;
            border-radius: 10px;
        }

        .orange {
            background-color: #f97316;
        }

        .purple {
            background-color: #a855f7;
        }

        .green {
            background-color: #22c55e;
        }

        .bright-green {
            background-color: #4ade80;
        }
    </style>
</head>

<body>
    <h1>Color Test - Exact Hex Codes</h1>
    <div class="color-box orange">#f97316<br>Orange</div>
    <div class="color-box purple">#a855f7<br>Purple</div>
    <div class="color-box green">#22c55e<br>Green</div>
    <div class="color-box bright-green">#4ade80<br>Bright Green</div>
</body>

</html>
